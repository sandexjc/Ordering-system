{% load static %}

<div id="offcanvas-history-tab-{{ object.id }}">
    <div class="offcanvas offcanvas-end" tabindex="-1" id="history-tab-{{ object.id }}">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">
                История за поръчка №{{ object.id }}
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="{{ object.id }}" pulled="False">
            <button class="btn btn-outline-secondary" id="historyRefresh{{ object.id }}" type="button">
                <img src="{% static 'images/refresh-arrow.png' %}" class="tableIcons">
            </button>
            <div class="d-flex justify-content-center" style="margin-top: 100%;">
                <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>
