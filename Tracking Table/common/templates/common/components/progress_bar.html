{% comment %}
    Expected context:
    - item: the object this bar represents (used for ID binding)
    - steps: a list of tuples (step_name, active, disabled)
    Example: [("ordered", True, False), ("delivered", False, False)]
{% endcomment %}

<ul class="progressbar" id="bar{{ item.pk }}">
    {% for step, active, disabled in steps %}
        <li class="{{ step }} {% if active %}active{% endif %} {% if disabled %}disabled{% endif %}" id="prog{{ item.pk }}_{{ step }}"></li>
    {% endfor %}
</ul>
