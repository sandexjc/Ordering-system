<table class="table table-sm table-bordered border-dark">
    <thead>
        <tr>
            <th scope="col">Други услуги</th>
            <th scope="col">Брой</th>
            <th scope="col">Ед. цена</th>
            <th scope="col">Ст-ст</th>
        </tr>
    </thead>
    <tbody>
        {% for other in order.others.all %}
            <tr>
                <td>{{other.description}}</td>
                <td>{{other.quantity}}</td>
                <td>{{other.price}}</td>
                <td>{{other.value}}</td>
            </tr>
        {% endfor %}
        <th colspan="3">Обща стойност</th>
        <th>{{order.others_total}}</th>
    </tbody>
</table>
